on:
  release:
    types: [created]

jobs:
  upload-assets:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (required) Comma-separated list of binary names (non-extension portion of filename) to build and upload.
          # Note that glob pattern is not supported yet.
          bin: systemctl-tui
          target: ${{ matrix.target }}
          # (required) GitHub token for uploading assets to GitHub Releases.
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-debs:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
          - target: x86_64-unknown-linux-musl
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build .deb
        # --no-strip: cargo-deb strips by default with the host `strip`, which
        # chokes on aarch64 binaries. We don't strip release binaries anyway
        # (see Cargo.toml), so skip it for both targets.
        run: cargo deb -p systemctl-tui --target ${{ matrix.target }} --output . --no-strip
      - name: Upload .deb to release
        run: gh release upload "$GITHUB_REF_NAME" ./*.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}