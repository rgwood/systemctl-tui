name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run Clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test

  # End-to-end tests: drives the real binary in tmux, both against local systemd
  # and in --host mode against sshd on the runner itself (runners run real systemd)
  integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install tmux, sshd, and uv
      run: |
        sudo apt-get update && sudo apt-get install -y tmux openssh-server
        curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Set up passwordless ssh to localhost
      run: |
        sudo systemctl start ssh
        ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519
        cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        ssh-keyscan -H localhost >> ~/.ssh/known_hosts
        # let the runner user read the system journal so logs render
        # (takes effect for ssh sessions immediately since they are fresh logins)
        sudo usermod -aG systemd-journal "$USER"
        ssh -o BatchMode=yes localhost true

    - name: Build
      run: cargo build

    - name: Run integration tests (local)
      run: ./scripts/integration-test.py

    - name: Run integration tests (remote via ssh localhost)
      run: ./scripts/integration-test.py --host localhost

  # Remote mode against real systemd versions (239→current) running as PID 1 in
  # containers. See scripts/remote-matrix.py; runs locally too.
  systemd-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # real systemd versions, plus hostile hosts where remote mode must fail gracefully
        distro: [rocky-8, ubuntu-20.04, ubuntu-22.04, debian-12, ubuntu-24.04, fedora-latest, no-systemd, dead-systemd]

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install tmux and uv
      run: |
        sudo apt-get update && sudo apt-get install -y tmux
        curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Build
      run: cargo build

    - name: Run systemd matrix tests
      run: ./scripts/remote-matrix.py --distro ${{ matrix.distro }}
